name: Publish

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  OWNER: david-gary
  IMAGE_API: ghcr.io/david-gary/certainaity-api
  IMAGE_WORKER: ghcr.io/david-gary/certainaity-worker

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_WORKER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

  scan-published:
    name: Scan published images
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.50.4

      - name: Scan API image (SARIF)
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-api.sarif \
            ${{ env.IMAGE_API }}:${{ steps.version.outputs.VERSION }}

      - name: Scan worker image (SARIF)
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-worker.sarif \
            ${{ env.IMAGE_WORKER }}:${{ steps.version.outputs.VERSION }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload SARIF reports to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "."
          category: trivy

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG entry for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract the section between this version header and the next
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Compute image digests
        id: digests
        run: |
          API_DIGEST=$(docker manifest inspect ${{ env.IMAGE_API }}:${{ steps.version.outputs.VERSION }} | jq -r '.manifests[0].digest // "N/A"')
          WORKER_DIGEST=$(docker manifest inspect ${{ env.IMAGE_WORKER }}:${{ steps.version.outputs.VERSION }} | jq -r '.manifests[0].digest // "N/A"')
          echo "api_digest=$API_DIGEST" >> "$GITHUB_OUTPUT"
          echo "worker_digest=$WORKER_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Certainaity v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          generate_release_notes: false
