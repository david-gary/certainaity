name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        env:
          CERTAINAITY_USE_CPU: "true"
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            -x \
            --cov=certainaity \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Check no critical tests skipped
        run: grep -r "pytest.mark.critical" tests/ | wc -l

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install api + dev dependencies
        run: pip install -e ".[dev,api]"

      - name: CLI smoke test
        run: |
          # Verify the entrypoint is importable and --help exits cleanly.
          certainaity analyze --help

      - name: Run integration tests
        env:
          CERTAINAITY_USE_CPU: "true"
          # Point output at a temp dir so tests don't write into the repo.
          CERTAINAITY_OUTPUT_DIR: "/tmp/certainaity_test_output"
          # JWT key path doesn't exist; tests mock verify_jwt directly.
          CERTAINAITY_JWT_PUBLIC_KEY_PATH: "/tmp/nonexistent_jwt.pem"
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -x

  container-scan:
    name: Container security scan (Trivy)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.50.4

      - name: Build api image for scanning
        run: docker build -f docker/Dockerfile.api -t certainaity-api:scan .

      - name: Scan api image
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            certainaity-api:scan

      - name: Build worker image for scanning
        run: docker build -f docker/Dockerfile.worker -t certainaity-worker:scan .

      - name: Scan worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            certainaity-worker:scan

  model-smoke:
    name: Model architecture smoke tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install worker dependencies (CPU-only torch)
        run: pip install -e ".[dev]" torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Verify model stubs instantiate and raise WeightsNotFoundError
        env:
          CERTAINAITY_USE_CPU: "true"
        run: |
          pytest tests/unit/test_models.py tests/unit/test_ensemble.py \
            -v \
            --tb=short \
            -k "not test_architecture_has_features and not test_early_blocks"

      - name: Verify PatchForensic forward pass shape (CPU)
        env:
          CERTAINAITY_USE_CPU: "true"
        run: |
          python - <<'EOF'
          import torch
          from certainaity.models.patchforensic import _PatchForensicNet
          net = _PatchForensicNet()
          with torch.no_grad():
              out = net(torch.zeros(1, 3, 256, 256))
          assert out.shape == (1, 1, 256, 256), f"Unexpected shape: {out.shape}"
          assert 0.0 <= float(out.min()) and float(out.max()) <= 1.0
          print("PatchForensicNet forward: OK", out.shape)
          EOF

      - name: Verify ensemble default weights sum to 1
        run: |
          python - <<'EOF'
          from certainaity.models.ensemble import _DEFAULT_WEIGHTS
          total = sum(_DEFAULT_WEIGHTS.values())
          assert abs(total - 1.0) < 1e-6, f"Weights sum to {total}, expected 1.0"
          print("Ensemble default weights: OK", _DEFAULT_WEIGHTS)
          EOF
