server {
    listen 443 ssl http2;
    server_name api.forenscope.io;

    ssl_certificate     /etc/ssl/certs/forenscope.crt;
    ssl_certificate_key /etc/ssl/certs/forenscope.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 50 MB + multipart overhead
    client_max_body_size 55M;

    location /v1/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Serve generated reports directly from the output volume.
    location /v1/reports/ {
        alias /srv/output/;
        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff";
        add_header Cache-Control "private, max-age=86400";
    }
}

server {
    listen 80;
    server_name api.forenscope.io;
    return 301 https://$host$request_uri;
}
