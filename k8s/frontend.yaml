apiVersion: apps/v1
kind: Deployment
metadata:
  name: certainaity-frontend
  namespace: certainaity
  labels:
    app: certainaity-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: certainaity-frontend
  template:
    metadata:
      labels:
        app: certainaity-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/david-gary/certainaity-frontend:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: certainaity-frontend
  namespace: certainaity
spec:
  selector:
    app: certainaity-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
