apiVersion: apps/v1
kind: Deployment
metadata:
  name: forenscope-worker
  namespace: forenscope
  labels:
    app: forenscope-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forenscope-worker
  template:
    metadata:
      labels:
        app: forenscope-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: worker
          image: ghcr.io/david-gary/forenscope-worker:latest
          envFrom:
            - configMapRef:
                name: forenscope-config
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
          volumeMounts:
            - name: output
              mountPath: /output
            - name: weights
              mountPath: /weights
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: forenscope-output
        - name: weights
          persistentVolumeClaim:
            claimName: forenscope-weights
      # Schedule worker pods on GPU nodes.
      nodeSelector:
        accelerator: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
